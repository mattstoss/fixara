{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixera</title>
    <link rel="stylesheet" href="{% static 'fixera_app/css/styles.css' %}">
</head>

<body>
    <nav>
        {% if user.is_authenticated %}
        <a href="{% url 'logout' %}">Logout</a>
        {% endif %}
    </nav>
    <header>
        {% block header %}
        <!-- Content will be overridden in child templates -->
        {% endblock %}
    </header>

    <main>
        {% block main %}
        <!-- Content will be overridden in child templates -->
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2023 Fixera</p>
    </footer>

    {% block script %}
    <!-- Content will be overridden in child templates -->
    {% endblock %}
</body>

</html>
